<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Optometría Pro</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:15px;
}
.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.row{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
}
.eye{
    flex:1;
    min-width:280px;
}
input{
    width:100%;
    padding:6px;
    margin-bottom:10px;
}
button{
    width:100%;
    padding:10px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
}
canvas{
    background:#f0f4ff;
    border-radius:8px;
    margin-top:10px;
}
.result{
    background:#eef3ff;
    padding:10px;
    border-radius:6px;
    margin-top:10px;
    font-size:14px;
}
h3{text-align:center;}
</style>
</head>

<body>
<div class="container">
<h2 style="text-align:center;">Calculadora Optometría con Cruz Óptica Dinámica</h2>

<div class="row">

<div class="eye">
<h3>OD</h3>
<input type="number" step="0.01" id="s_od" placeholder="Esfera">
<input type="number" step="0.01" id="c_od" placeholder="Cilindro">
<input type="number" id="a_od" placeholder="Eje">
<canvas id="canvas_od" width="250" height="250"></canvas>
<div class="result" id="res_od"></div>
</div>

<div class="eye">
<h3>OI</h3>
<input type="number" step="0.01" id="s_oi" placeholder="Esfera">
<input type="number" step="0.01" id="c_oi" placeholder="Cilindro">
<input type="number" id="a_oi" placeholder="Eje">
<canvas id="canvas_oi" width="250" height="250"></canvas>
<div class="result" id="res_oi"></div>
</div>

</div>

<br>
<button onclick="calcular()">Calcular</button>

</div>

<script>

function dibujarCruz(canvasId, esfera, cilindro, eje){

    let canvas = document.getElementById(canvasId);
    let ctx = canvas.getContext("2d");
    ctx.clearRect(0,0,canvas.width,canvas.height);

    let centro = canvas.width/2;
    let radio = 80;

    ctx.save();
    ctx.translate(centro,centro);
    ctx.rotate((eje*Math.PI)/180);

    ctx.beginPath();
    ctx.moveTo(-radio,0);
    ctx.lineTo(radio,0);
    ctx.moveTo(0,-radio);
    ctx.lineTo(0,radio);
    ctx.strokeStyle="black";
    ctx.lineWidth=2;
    ctx.stroke();
    ctx.restore();

    let mer1 = esfera.toFixed(2);
    let mer2 = (esfera+cilindro).toFixed(2);

    ctx.fillStyle="black";
    ctx.font="14px Arial";
    ctx.fillText(mer1 + " D", 10,20);
    ctx.fillText(mer2 + " D", 150,20);
}

function diagnostico(s,c){
    let absC = Math.abs(c);

    if(c == 0){
        if(s > 0) return "Hipermetropía";
        if(s < 0) return "Miopía";
        return "Emetropía";
    }

    if(s == 0) return "Astigmatismo Miópico Simple";
    if(s < 0) return "Astigmatismo Miópico Compuesto";

    if(s > 0){
        if(Math.abs(s) == absC) return "Astigmatismo Hipermetrópico Simple";
        if(Math.abs(s) > absC) return "Astigmatismo Hipermetrópico Compuesto";
        if(Math.abs(s) < absC) return "Astigmatismo Mixto";
    }

    return "No determinado";
}

function calcular(){

    let s_od=parseFloat(document.getElementById("s_od").value)||0;
    let c_od=parseFloat(document.getElementById("c_od").value)||0;
    let a_od=parseFloat(document.getElementById("a_od").value)||0;

    let s_oi=parseFloat(document.getElementById("s_oi").value)||0;
    let c_oi=parseFloat(document.getElementById("c_oi").value)||0;
    let a_oi=parseFloat(document.getElementById("a_oi").value)||0;

    dibujarCruz("canvas_od", s_od, c_od, a_od);
    dibujarCruz("canvas_oi", s_oi, c_oi, a_oi);

    document.getElementById("res_od").innerHTML=
        "<b>Diagnóstico:</b> "+diagnostico(s_od,c_od);

    document.getElementById("res_oi").innerHTML=
        "<b>Diagnóstico:</b> "+diagnostico(s_oi,c_oi);
}

</script>
</body>
</html>
